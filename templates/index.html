<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flask + Hugging Face Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px;
      font-size: 16px;
    }
    button {
      margin-top: 12px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    .card {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
    }
    .muted {
      color: #666;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Flask + Hugging Face Sentiment Demo</h1>
  <p class="muted">Enter text and get a sentiment prediction.</p>

  <textarea id="text" placeholder="Type something like: I really enjoyed this project."></textarea>
  <br />
  <button onclick="analyzeText()">Analyze</button>

  <div id="result" class="card" style="display:none;"></div>

  <script>
    async function analyzeText() {
      const text = document.getElementById("text").value;
      const resultDiv = document.getElementById("result");

      resultDiv.style.display = "block";
      resultDiv.innerHTML = "Analyzing...";

      try {
        const res = await fetch("/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });

        const data = await res.json();

        if (!data.success) {
          resultDiv.innerHTML = `<strong>Error:</strong> ${data.message || data.error}`;
          return;
        }

        resultDiv.innerHTML = `
          <h3>Result</h3>
          <p><strong>Top label:</strong> ${data.top_label}</p>
          <p><strong>Score:</strong> ${data.top_score}</p>
          <details>
            <summary>Raw response</summary>
            <pre>${JSON.stringify(data.result, null, 2)}</pre>
          </details>
        `;
      } catch (err) {
        resultDiv.innerHTML = `<strong>Error:</strong> ${err.message}`;
      }
    }
  </script>
</body>
</html>
